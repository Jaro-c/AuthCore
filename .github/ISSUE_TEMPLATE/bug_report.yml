name: Bug Report
description: Report a bug to help us improve authcore
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        **Do not use this form for security vulnerabilities.** See [SECURITY.md](../../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest possible Go snippet or steps that reproduce the issue.
        Wrap code in triple backticks. **Do not include real keys, tokens, or secrets.**
      placeholder: |
        ```go
        cfg := authcore.DefaultConfig()
        auth, err := authcore.New(cfg)
        // ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: authcore-version
    attributes:
      label: authcore version
      description: Output of `go list -m github.com/Jaro-c/authcore`
      placeholder: "github.com/Jaro-c/authcore v0.1.0"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: "go1.26.0 linux/amd64"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      description: Paste any error output or stack traces here. Remove any sensitive values before posting.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help diagnose the issue.
