name: Feature Request
description: Suggest an idea or enhancement for authcore
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to authcore.
        Since this is a security library, please consider whether your request has any cryptographic or security implications and describe them in your proposal.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What use case is currently not covered?
      placeholder: "I'm building a multi-tenant API and need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed. If it involves a new API, sketch the function signatures.
      placeholder: |
        ```go
        // Example of what the new API might look like
        ```
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: |
        Does this feature touch token generation, key management, hashing, or any other security boundary?
        If so, describe the threat model and any risks you are aware of.
      placeholder: "This does not affect security / This changes how refresh tokens are hashed because..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have already tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to relevant RFCs, prior art, or related issues.
